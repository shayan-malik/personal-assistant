<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }

  .jarvis-app {
    background: radial-gradient(ellipse at center, #0a1621 0%, #050b12 70%);
    min-height: 100vh;
    padding: 32px 20px 40px;
    font-family: 'Rajdhani', sans-serif;
    color: #cfeeff;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .jarvis-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: #4fd6ff;
    text-shadow: 0 0 12px rgba(79,214,255,0.6);
    margin-bottom: 4px;
  }

  .jarvis-subtitle {
    font-size: 13px;
    color: #4f7a8f;
    letter-spacing: 2px;
    margin-bottom: 28px;
  }

  .reactor-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 28px;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(79,214,255,0.25);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
  }
  .ring.r1 { width: 200px; height: 200px; }
  .ring.r2 { width: 160px; height: 160px; border-style: dashed; }

  .ring.spin { animation: spin 12s linear infinite; }
  @keyframes spin { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }

  .mic-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 2px solid #4fd6ff;
    background: radial-gradient(circle at 35% 30%, #163244, #071018);
    box-shadow: 0 0 24px rgba(79,214,255,0.45), inset 0 0 18px rgba(79,214,255,0.25);
    color: #4fd6ff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: box-shadow 0.2s ease, transform 0.15s ease;
  }
  .mic-btn:active { transform: translate(-50%,-50%) scale(0.96); }
  .mic-btn.listening {
    box-shadow: 0 0 40px rgba(79,214,255,0.85), inset 0 0 22px rgba(79,214,255,0.4);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(79,214,255,0.6), inset 0 0 20px rgba(79,214,255,0.3); }
    50% { box-shadow: 0 0 55px rgba(79,214,255,1), inset 0 0 26px rgba(79,214,255,0.5); }
  }

  .status-line {
    font-size: 14px;
    letter-spacing: 1px;
    color: #6fb8d6;
    margin-bottom: 24px;
    min-height: 20px;
    text-align: center;
  }

  .transcript {
    width: 100%;
    max-width: 420px;
    border: 1px solid rgba(79,214,255,0.2);
    border-radius: 10px;
    background: rgba(10,25,35,0.55);
    padding: 16px;
    max-height: 320px;
    overflow-y: auto;
  }

  .bubble { margin-bottom: 14px; }
  .bubble:last-child { margin-bottom: 0; }
  .bubble .label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .bubble.user .label { color: #7d8fa0; }
  .bubble.jarvis .label { color: #4fd6ff; }
  .bubble .text { font-size: 15px; line-height: 1.5; color: #dff4ff; }

  .empty-hint {
    font-size: 13px;
    color: #52788c;
    text-align: center;
    padding: 12px 0;
  }

  .setup-banner {
    width: 100%;
    max-width: 420px;
    border: 1px solid rgba(255,180,79,0.4);
    background: rgba(60,40,10,0.4);
    color: #ffd699;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .key-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .key-row input {
    flex: 1;
    background: #071018;
    border: 1px solid rgba(79,214,255,0.35);
    border-radius: 6px;
    color: #cfeeff;
    padding: 8px 10px;
    font-size: 13px;
  }
  .key-row button {
    background: #103042;
    border: 1px solid #4fd6ff;
    color: #4fd6ff;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: 'Rajdhani', sans-serif;
  }
</style>

<div class="jarvis-app">
  <div class="jarvis-title">J.A.R.V.I.S.</div>
  <div class="jarvis-subtitle">VOICE INTERFACE</div>

  <div class="setup-banner" id="setupBanner">
    Apni Google Gemini API key daalein (aistudio.google.com se free milegi). Ye sirf is phone/browser mein save hogi, kahin bhejenge nahi.
    <div class="key-row">
      <input type="password" id="apiKeyInput" placeholder="AIzaSy..." />
      <button id="saveKeyBtn">Save</button>
    </div>
  </div>

  <div class="reactor-wrap">
    <div class="ring r1 spin"></div>
    <div class="ring r2"></div>
    <button class="mic-btn" id="micBtn" aria-label="Tap to speak">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M12 15a3 3 0 003-3V6a3 3 0 10-6 0v6a3 3 0 003 3z"/>
        <path d="M19 11a7 7 0 01-14 0"/>
        <path d="M12 18v3"/>
      </svg>
    </button>
  </div>

  <div class="status-line" id="statusLine">Tap the reactor to speak</div>

  <div class="transcript" id="transcript">
    <div class="empty-hint" id="emptyHint">Baat karne ke liye upar tap karein</div>
  </div>
</div>

<script>
(function() {
  const micBtn = document.getElementById('micBtn');
  const statusLine = document.getElementById('statusLine');
  const transcript = document.getElementById('transcript');
  const emptyHint = document.getElementById('emptyHint');
  const setupBanner = document.getElementById('setupBanner');
  const apiKeyInput = document.getElementById('apiKeyInput');
  const saveKeyBtn = document.getElementById('saveKeyBtn');

  const history = [];
  let listening = false;
  let recognition = null;
  let apiKey = '';

  try {
    const saved = localStorage.getItem('jarvis_gemini_key');
    if (saved) {
      apiKey = saved;
      setupBanner.style.display = 'none';
    }
  } catch (e) {}

  saveKeyBtn.addEventListener('click', function() {
    const val = apiKeyInput.value.trim();
    if (!val) return;
    apiKey = val;
    try { localStorage.setItem('jarvis_gemini_key', val); } catch (e) {}
    setupBanner.style.display = 'none';
    statusLine.textContent = 'Tap the reactor to speak';
  });

  const SpeechRecognitionImpl = window.SpeechRecognition || window.webkitSpeechRecognition;

  function addBubble(role, text) {
    if (emptyHint) emptyHint.remove();
    const div = document.createElement('div');
    div.className = 'bubble ' + (role === 'user' ? 'user' : 'jarvis');
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'AAP' : 'JARVIS';
    const text_el = document.createElement('div');
    text_el.className = 'text';
    text_el.textContent = text;
    div.appendChild(label);
    div.appendChild(text_el);
    transcript.appendChild(div);
    transcript.scrollTop = transcript.scrollHeight;
  }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.0;
    utter.pitch = 1.0;
    window.speechSynthesis.speak(utter);
  }

  async function askJarvis(userText) {
    if (!apiKey) {
      addBubble('jarvis', 'Pehle upar API key daalein aur Save karein.');
      setupBanner.style.display = 'block';
      return;
    }

    history.push({ role: 'user', parts: [{ text: userText }] });
    statusLine.textContent = 'Soch raha hoon...';

    try {
      const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + encodeURIComponent(apiKey);
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          systemInstruction: {
            parts: [{ text: "Aap Jarvis hain, Tony Stark ke AI assistant jaisa - polite, thoda witty, helpful. Aap Hinglish mein baat karte hain, jawab hamesha chhote aur concise rakhein (2-3 sentences), kyunki yeh bola jayega." }]
          },
          contents: history
        })
      });

      const data = await response.json();

      if (data.error) {
        addBubble('jarvis', 'API error: ' + data.error.message);
        statusLine.textContent = 'Tap the reactor to speak';
        return;
      }

      const reply = data.candidates && data.candidates[0] && data.candidates[0].content
        ? data.candidates[0].content.parts[0].text
        : "Maaf kijiye, jawab nahi mil paya. Apni API key check karein.";

      history.push({ role: 'model', parts: [{ text: reply }] });
      addBubble('jarvis', reply);
      speak(reply);
      statusLine.textContent = 'Tap the reactor to speak';
    } catch (err) {
      addBubble('jarvis', 'Connection mein problem aayi. Dobara try karein.');
      statusLine.textContent = 'Tap the reactor to speak';
    }
  }

  if (!SpeechRecognitionImpl) {
    statusLine.textContent = 'Is browser mein voice input supported nahi hai. Chrome try karein.';
    micBtn.disabled = true;
    micBtn.style.opacity = '0.4';
  } else {
    recognition = new SpeechRecognitionImpl();
    recognition.lang = 'hi-IN';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = function() {
      listening = true;
      micBtn.classList.add('listening');
      statusLine.textContent = 'Sun raha hoon...';
    };

    recognition.onend = function() {
      listening = false;
      micBtn.classList.remove('listening');
    };

    recognition.onerror = function() {
      listening = false;
      micBtn.classList.remove('listening');
      statusLine.textContent = 'Kuch suna nahi. Dobara tap karein.';
    };

    recognition.onresult = function(event) {
      const said = event.results[0][0].transcript;
      addBubble('user', said);
      askJarvis(said);
    };

    micBtn.addEventListener('click', function() {
      if (listening) {
        recognition.stop();
      } else {
        window.speechSynthesis.cancel();
        recognition.start();
      }
    });
  }
})();
</script>
